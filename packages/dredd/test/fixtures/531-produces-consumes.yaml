openapi: "3.0.0"
info:
  title: Blog API
  version: "1.0"
paths:
  /articles:
    get:
      summary: List articles
      responses:
        "200":
          description: Articles list
          content:
            "application/hal+json; charset=utf-8":
              example:
                - id: 1
                  title: Creamy cucumber salad
                  text: "Slice cucumbers"
                  _links:
                    self:
                      href: /articles/1
    post:
      summary: Publish an article
      requestBody:
        content:
          "application/hal+json; charset=utf-8":
            example:
              title: Crispy schnitzel
              text: "Prepare eggs"
      responses:
        "201":
          description: New article
          content:
            "application/hal+json; charset=utf-8":
              example:
                id: 2
                title: Crispy schnitzel
                text: "Prepare eggs"
