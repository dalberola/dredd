openapi: "3.0.0"
info:
  title: Machines API
  version: "1.0"
paths:
  /machines:
    post:
      requestBody:
        content:
          application/json:
            example:
              type: bulldozer
              name: willy
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              example:
                mesage: Accepted
    get:
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
                - _id: "52341870ed55224b15ff07ef"
                  type: bulldozer
                  name: willy
  /machines/{name}:
    put:
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: willy
      requestBody:
        content:
          application/json:
            example:
              name: waldo
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
                type: bulldozer
                name: waldo
                _id: "5229c6e8e4b0bd7dbb07e29c"
    get:
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: waldo
      responses:
        "200":
          description: OK
          content:
            text/plain:
              example: |-
                {
                  "type": "bulldozer",
                  "name": "waldo",
                  "_id": "5229c6e8e4b0bd7dbb07e29c"
                }
    delete:
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: waldo
      responses:
        "204":
          description: No Content
